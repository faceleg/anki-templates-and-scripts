<script>
// Pinyin tone colorization

var TONE_COLORS = {
  1: "#f44336",
  2: "#ff9800",
  3: "#4caf50",
  4: "#2196f3",
  5: document.body.classList.contains("night_mode") ? "#fff" : "#555",
};

function decodePinyin(pinyin) {
  var coreVowels = ["a", "e", "i", "o", "u", "ü", "v"];
  var tonesArr = [];
  var buffer = [];

  function isCore(char, charPrevTwo, charNext) {
    if (
      char === "r" &&
      (charNext === " " || charNext === "") &&
      charPrevTwo !== " " &&
      charPrevTwo !== ""
    ) {
      return [true, true];
    }
    char = char
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase();
    for (var i = 0; i < coreVowels.length; i++) {
      if (char === coreVowels[i]) {
        return [true, false];
      }
    }
    return [false, false];
  }

  function getTone(str) {
    var pure = str.replace(/a|e|i|o|u|ü|r/g, "");
    if (pure === "") {
      return 5;
    } else if (["ā", "ē", "ī", "ō", "ū", "ǖ", "v̄"].indexOf(pure) !== -1) {
      return 1;
    } else if (["á", "é", "í", "ó", "ú", "ǘ", "v́"].indexOf(pure) !== -1) {
      return 2;
    } else if (["ǎ", "ě", "ǐ", "ǒ", "ǔ", "ǚ", "v̌"].indexOf(pure) !== -1) {
      return 3;
    } else if (["à", "è", "ì", "ò", "ù", "ǜ", "v̀"].indexOf(pure) !== -1) {
      return 4;
    } else {
      return 4; // Probably 绿 with v̀
    }
  }

  function flush() {
    if (buffer.length > 0) {
      tonesArr.push(getTone(buffer.join("")));
      buffer = [];
    }
  }

  for (var i = 0; i < pinyin.length; i++) {
    var result = isCore(pinyin[i], pinyin[i - 2], pinyin[i + 1]);
    if (result[1]) {
      flush();
    }
    if (result[0]) {
      buffer.push(pinyin[i]);
    } else {
      flush();
    }
  }

  if (buffer.length > 0) {
    tonesArr.push(getTone(buffer.join("")));
  }

  return tonesArr;
}

function recolorPinyin(pinyinElement, decodedTones) {
  var pinyinText = pinyinElement.textContent.trim();
  var coloredPinyin = "";
  var wordIndex = 0;

  for (var i = 0; i < pinyinText.length; i++) {
    if (pinyinText[i] === " ") {
      coloredPinyin += " ";
      wordIndex++;
      continue;
    }
    var color = TONE_COLORS[decodedTones[wordIndex]] || "#000"; // Default color to black if tone is not found
    coloredPinyin +=
      '<span style="color:' + color + ';">' + pinyinText[i] + "</span>";
  }

  pinyinElement.innerHTML = coloredPinyin;
}

function isChineseCharacter(char) {
  return /^[\u4e00-\u9fff]$/.test(char);
}

function recolorCharacters(characterElement, decodedTones) {
  var characterText = characterElement.innerHTML;
  var coloredCharacters = "";
  var wordIndex = 0;

  for (var i = 0; i < characterText.length; i++) {
    if (!isChineseCharacter(characterText[i])) {
      coloredCharacters += characterText[i];
    } else {
      var color = TONE_COLORS[decodedTones[wordIndex]] || "#555"; // Default color to grey if tone is not found
      coloredCharacters +=
        '<span style="color:' + color + ';">' + characterText[i] + "</span>";
      wordIndex++;
    }
  }

  characterElement.innerHTML = coloredCharacters;
}

function applyColorization() {
  var pinyinElement = document.getElementById("char_pinyin");
  if (!pinyinElement) {
    return;
  }
  var decodedTones = decodePinyin(pinyinElement.textContent);
  recolorPinyin(pinyinElement, decodedTones);

  var hanziElement = document.getElementById("char_sim");
  if (hanziElement) {
    recolorCharacters(hanziElement, decodedTones);
  }

  var traditionalElement = document.getElementById("char_trad");
  var hanziElement = document.getElementById("char_sim");
  if (hanziElement) {
    recolorCharacters(traditionalElement, decodedTones);
  }
}

applyColorization();

</script>
<script>
// Font rotation — assigns a class to Chinese character elements based on time
// to rotate through fonts every 3 minutes, helping readers learn multiple fonts.

function assignClassBasedOnTime() {
  var charSimElement = document.getElementById("char_sim");
  var charSimColorElement = document.getElementById("char_sim_coloured");
  var charReadingElement = document.getElementById("char_reading");

  var now = new Date();
  var minutes = now.getMinutes();
  var seconds = now.getSeconds();
  var segment = Math.floor((minutes * 60 + seconds) / 180); // 3-minute segments

  var classes = ["kaiti", "songti", "heiti", "mashanzheng", "yrdzst", "xxx", "yyy"];
  var cls = classes[segment % classes.length];

  if (charSimElement) charSimElement.className = "char-card " + cls;
  if (charSimColorElement) charSimColorElement.className = "char-card " + cls;
  if (charReadingElement) charReadingElement.className = "char-card " + cls;

  var fontNameEl = document.getElementById("font-name");
  if (fontNameEl) fontNameEl.innerHTML = cls;
}

assignClassBasedOnTime();

</script>
