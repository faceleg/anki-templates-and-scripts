<div id="back">

    {{FrontSide}}

    <hr/>

    <div class="char_meaning">{{English}}</div>
    <br/>

    <div class="modal-footer1">
        <a class="btn" id="btnShowPinyin">
            <div class="icon">
                <i class="material-icons">text_increase</i>
            </div>
        </a>
        <a class="btn" id="btnShowRuby">
            <div class="icon">
                <i class="material-icons">text_rotation_none</i>
            </div>
        </a>
        <a class="btn" id="btnPlayAudio">
            <div class="icon">
                <i class="material-icons">play_arrow</i>
            </div>
        </a>
    </div>
    
    <div id="char_pinyin" style="display:none;">
        {{Pinyin}}
    </div>

    <div id="char_reading" style="display:none">
        <ruby>
            {{Color}}<rt>{{Pinyin}}</rt>
        </ruby>
    </div>

    <div id="char_deck">
        <div>{{Deck}}</div>
        <div>{{Card}}</div>
        <div>
            font name: <span id="font-name"></span>
        </div>
        <div id="audio">{{Audio}}</div>
    </div>	
</div>

<script type="text/javascript">

    document.addEventListener("DOMContentLoaded", function() {
        // Select the target element
        var spans = document.querySelectorAll('span');

        // Define the characters to remove
        var charsToRemove = "\u200E"; // This is the Unicode for the Left-to-Right Mark

        spans.forEach(function(span) {
            // Replace the characters with an empty string
            span.textContent = span.textContent.split(charsToRemove).join('');
        });
    });

    // Show pinyin
    var btnShowPinyin = document.getElementById('btnShowPinyin');
    btnShowPinyin.onclick = function(event) {
        const display = document.getElementById('char_pinyin').style.display;
        document.getElementById('char_pinyin').style.display = display === "block" ? "none" : "block";
    }
    var btnShowPinyin = document.getElementById('btnShowRuby');
    btnShowPinyin.onclick = function(event) {
        const display = document.getElementById('char_reading').style.display;
        document.getElementById('char_reading').style.display = display === "block" ? "none" : "block";
    }

    document.getElementById('btnPlayAudio').onclick = function() { playAudio(); };
</script>


<script>
// Audio playback utilities

function playAudio() {
  var audioDiv = document.getElementById("audio");
  if (!audioDiv) return;
  var audio = audioDiv.getElementsByTagName("*");
  if (!audio.length) return;
  audio[0].tagName == "AUDIO" ? audio[0].play() : audio[0].click();
}

// AudioManager — speech synthesis and Anki audio playback
var AudioManager = (function () {
  var _voice = null;
  var _voicesLoaded = false;
  var _pendingPhrase = null;

  function _findVoice() {
    var voices = speechSynthesis.getVoices();
    return (
      voices.find(function (v) {
        return (
          v.lang.indexOf("zh-CN") === 0 &&
          v.name.toLowerCase() === "tingting"
        );
      }) ||
      voices.find(function (v) {
        return v.lang.indexOf("zh") === 0;
      }) ||
      null
    );
  }

  function _loadVoices() {
    _voice = _findVoice();
    _voicesLoaded = true;
  }

  if (speechSynthesis.getVoices().length > 0) {
    _loadVoices();
  } else {
    speechSynthesis.addEventListener("voiceschanged", function onVoicesChanged() {
      _loadVoices();
      speechSynthesis.removeEventListener("voiceschanged", onVoicesChanged);
    });
  }

  function speak(phrase, onEnd) {
    if (!phrase) return;
    if (!_voicesLoaded) {
      _voice = _findVoice();
      _voicesLoaded = true;
    }

    if (speechSynthesis.speaking) {
      _pendingPhrase = { phrase: phrase, onEnd: onEnd };
      return;
    }

    _pendingPhrase = null;
    _doSpeak(phrase, onEnd);
  }

  function _doSpeak(phrase, onEnd) {
    var utterance = new SpeechSynthesisUtterance();
    utterance.rate = 0.5;
    utterance.volume = 0.75;
    utterance.lang = "zh";
    if (_voice) utterance.voice = _voice;
    utterance.text = phrase;
    utterance.onend = function () {
      if (onEnd) onEnd();
      if (_pendingPhrase) {
        var next = _pendingPhrase;
        _pendingPhrase = null;
        _doSpeak(next.phrase, next.onEnd);
      }
    };
    speechSynthesis.speak(utterance);
  }

  function playAnkiAudio() {
    var audioDiv = document.getElementById("audio");
    if (!audioDiv) return;
    var els = audioDiv.getElementsByTagName("*");
    if (!els.length) return;
    els[0].tagName === "AUDIO" ? els[0].play() : els[0].click();
  }

  return { speak: speak, playAnkiAudio: playAnkiAudio };
})();

</script>
<script>
// Font rotation — assigns a class to Chinese character elements based on time
// to rotate through fonts every 3 minutes, helping readers learn multiple fonts.

function assignClassBasedOnTime() {
  var charSimElement = document.getElementById("char_sim");
  var charSimColorElement = document.getElementById("char_sim_coloured");
  var charReadingElement = document.getElementById("char_reading");

  var now = new Date();
  var minutes = now.getMinutes();
  var seconds = now.getSeconds();
  var segment = Math.floor((minutes * 60 + seconds) / 180); // 3-minute segments

  var classes = ["kaiti", "songti", "heiti", "mashanzheng", "yrdzst", "xxx", "yyy"];
  var cls = classes[segment % classes.length];

  if (charSimElement) charSimElement.className = "char-card " + cls;
  if (charSimColorElement) charSimColorElement.className = "char-card " + cls;
  if (charReadingElement) charReadingElement.className = "char-card " + cls;

  var fontNameEl = document.getElementById("font-name");
  if (fontNameEl) fontNameEl.innerHTML = cls;
}

assignClassBasedOnTime();

</script>
